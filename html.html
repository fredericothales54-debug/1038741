<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olhos Seguidores de Mouse</title>
    <style>
        /* --- ESTILO (CSS) --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50; /* Cor de fundo escura */
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .container {
            display: flex;
            gap: 40px; /* Espaço entre os olhos */
        }

        .eye {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden; /* Importante para o efeito de piscar */
        }

        .pupil {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            /* Suaviza o movimento da pupila */
            transition: transform 0.1s ease-out; 
        }

        /* --- Estilo da Pálpebra (para piscar) --- */
        .eyelid {
            position: absolute;
            top: -100%; /* Começa escondida acima do olho */
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f1c40f; /* Cor da pálpebra (pode ser a cor da pele) */
            border-radius: 50%;
            z-index: 10;
        }

        /* Classe de animação para piscar */
        .blink {
            animation: blink-animation 0.2s ease-in-out;
        }

        @keyframes blink-animation {
            0%, 100% {
                top: -100%;
            }
            50% {
                top: 0%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="eye">
            <div class="eyelid"></div> <div class="pupil"></div>  </div>
        <div class="eye">
            <div class="eyelid"></div> <div class="pupil"></div>  </div>
    </div>

    <script>
        const eyes = document.querySelectorAll('.eye');
        const eyelids = document.querySelectorAll('.eyelid');

        // 1. Lógica para seguir o mouse
        document.addEventListener('mousemove', (e) => {
            eyes.forEach(eye => {
                const pupil = eye.querySelector('.pupil');
                
                // Encontra o centro do olho
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                
                // Calcula o ângulo e a distância do mouse
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = 30; // Distância máxima que a pupila se move
                
                // Calcula as novas coordenadas X e Y da pupila
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                // Aplica a transformação para mover a pupila
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // 2. Lógica para piscar automaticamente
        function blinkEyes() {
            eyelids.forEach(eyelid => {
                eyelid.classList.add('blink');
                
                // Remove a classe após a animação para poder repetir
                setTimeout(() => {
                    eyelid.classList.remove('blink');
                }, 200); // Tempo igual à duração da animação CSS
            });

            // Define o próximo piscar em um tempo aleatório (entre 2 e 6 segundos)
            const nextBlink = Math.random() * (6000 - 2000) + 2000;
            setTimeout(blinkEyes, nextBlink);
        }

        // Inicia o ciclo de piscar
        blinkEyes();
    </script>
</body>
</html>
